<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>OMWANDI Timekeeper</title>
  
  <meta name="theme-color" content="#1d4ed8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icons/logo.svg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/styles.css?v=5.0">
  <style>
    /* Premium Login Styles matching Screenshot exactly */
    #loginOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #f4f7fa; 
      z-index: 9999; display: flex; align-items: center; justify-content: center;
      color: #333;
    }
    .login-card { 
      width: 100%; max-width: 440px; padding: 40px; text-align: center;
      background: #ffffff; border-radius: 12px; border: 1px solid #e1e8f0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }
    .login-logo-container {
        width: 100%; max-width: 280px; height: 120px;
        margin: 0 auto 30px auto; display: flex; align-items: center; justify-content: center;
    }
    .login-logo { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
    .login-title { 
        font-family: 'Montserrat', sans-serif;
        font-size: 1.4rem; font-weight: 600; color: #000; 
        margin-bottom: 40px; text-transform: uppercase; letter-spacing: 1.5px;
    }
    .form-group { text-align: left; margin-bottom: 24px; position: relative; }
    .form-label { display: block; font-size: 0.85rem; font-weight: 600; color: #000; margin-bottom: 8px; }
    .login-input {
      width: 100%; padding: 14px 16px; font-size: 1rem;
      background: #ffffff; border: 1px solid #d1d9e6; border-radius: 8px;
      color: #333; outline: none; transition: border-color 0.2s;
    }
    .btn-login {
      width: 100%; padding: 16px; background: #0d6efd; color: #fff;
      border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
  </style>
</head>
<body class="dark-theme">

  <div id="loginOverlay">
    <div class="login-card">
      <div class="login-logo-container"><img src="/icons/logo.png" class="login-logo" alt="Logo" onerror="this.src='/icons/logo.svg'"></div>
      <h1 class="login-title">OMWANDI TIMEKEEPER</h1>
      <form id="loginForm">
        <div class="form-group"><label class="form-label">Employee Number</label><input type="text" id="loginEmpNo" class="login-input" placeholder="e.g. 111" required autofocus></div>
        <div class="form-group"><label class="form-label">Password</label><input type="password" id="loginPassword" class="login-input" required></div>
        <button type="submit" class="btn-login">Sign In to Portal</button>
      </form>
      <p id="loginError" style="color: #ef4444; font-size: 0.85rem; margin-top: 20px;" class="hidden">Invalid credentials.</p>
    </div>
  </div>
  
  <div class="app-layout hidden" id="appLayout">
    <aside class="sidebar glass-container">
      <div class="brand"><h1>OMWANDI <span style="font-size: 0.8rem; font-weight: 400; opacity: 0.7;">Timekeeper</span></h1></div>
      <div class="profile-card" id="activeProfileCard">
        <div class="profile-info"><div class="profile-name" id="activeName">---</div><div class="profile-role" id="activeRole">---</div></div>
      </div>
      <nav class="nav-menu">
        <button id="nav-dashboard" class="nav-item active" data-view="dashboard"><span>Dashboard</span></button>
        <button id="nav-timer" class="nav-item" data-view="timer"><span>Live Timer</span></button>
        <button id="nav-projects" class="nav-item" data-view="projects"><span>Projects</span></button>
        <button id="nav-team" class="nav-item" data-view="team"><span>Team</span></button>
        <button id="nav-timesheets" class="nav-item" data-view="timesheets"><span>Timesheets</span></button>
        <button id="nav-settings" class="nav-item" data-view="settings"><span>Settings</span></button>
      </nav>
      <div class="sidebar-footer" style="margin-top: auto;"><button id="logoutBtn" class="btn outline" style="width: 100%; font-size: 0.8rem;" onclick="handleLogout()">Logout</button></div>
    </aside>

    <main class="main-content" id="mainContent"></main>

    <!-- Mobile Navigation Bar for Foremen -->
    <nav class="mobile-nav" id="mobileNav">
    <button class="mobile-nav-item active" data-view="dashboard">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        <span>Dashboard</span>
    </button>
    <button class="mobile-nav-item" data-view="timer">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>Timer</span>
    </button>
    <button class="mobile-nav-item" data-view="projects">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span>Projects</span>
    </button>
    <button class="mobile-nav-item" id="mobileMoreBtn" onclick="toggleMobileMore()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="12" cy="19" r="1" fill="currentColor"/></svg>
        <span>More</span>
    </button>
</nav>

<!-- Mobile More Drawer -->
<div class="mobile-more-drawer" id="mobileMoreDrawer">
    <div class="mobile-more-overlay" onclick="toggleMobileMore()"></div>
    <div class="mobile-more-panel glass-panel">
        <div class="mobile-more-handle"></div>
        <button class="mobile-more-item" data-view="timesheets" onclick="toggleMobileMore()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span>Timesheets</span>
        </button>
        <button class="mobile-more-item" data-view="team" onclick="toggleMobileMore()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>Team</span>
        </button>
        <button class="mobile-more-item" data-view="settings" onclick="toggleMobileMore()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span>Settings</span>
        </button>
        <div class="mobile-more-divider"></div>
        <button class="mobile-more-item danger" onclick="handleLogout(); toggleMobileMore()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span>Logout</span>
        </button>
    </div>
</div>
  </div>

  <div class="notification-container" id="notification-container"></div>
  <script type="module" src="/app.js"></script>
</body>
</html>
